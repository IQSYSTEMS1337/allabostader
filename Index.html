<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allabostäder | Premium AI-insikter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --black: #050505; --white: #ffffff; --accent: #007AFF; }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        
        /* Miljard-dollar rubrik */
        h1 { font-size: clamp(40px, 10vw, 90px); font-weight: 900; letter-spacing: -4px; margin: 0; background: linear-gradient(180deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.9; }
        
        /* Snygg sökruta */
        .search-box { margin-top: 50px; width: 90%; max-width: 600px; position: relative; }
        input { width: 100%; padding: 25px; border-radius: 50px; border: 1px solid #222; background: #111; color: #fff; font-size: 18px; outline: none; transition: 0.4s; box-sizing: border-box; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 40px rgba(0,122,255,0.15); }
        
        /* Resultatlista */
        .results { position: absolute; top: 110%; left: 0; right: 0; background: #0a0a0a; border-radius: 20px; border: 1px solid #222; max-height: 350px; overflow-y: auto; text-align: left; z-index: 100; display: none; }
        .item { padding: 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }
        .item:hover { background: #111; color: var(--accent); }
    </style>
</head>
<body>

    <h1>Hitta hemmet.<br>Innan de andra.</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Sök bland 3 000 orter..." autocomplete="off">
        <div id="results" class="results"></div>
    </div>

    <script>
        const input = document.getElementById('searchInput');
        const resBox = document.getElementById('results');

        input.addEventListener('input', async () => {
            const q = input.value.toLowerCase();
            if(q.length < 2) { resBox.style.display = 'none'; return; }
            
            try {
                const response = await fetch('Aiorter.csv');
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                
                const matches = rows.filter(r => r.toLowerCase().includes(q)).slice(0, 6);
                
                if(matches.length > 0) {
                    resBox.style.display = 'block';
                    resBox.innerHTML = matches.map(r => {
                        const cols = r.split(';');
                        return `<div class="item" onclick="alert('AI analyserar ${cols[0]}...')">
                            <strong>${cols[0]}</strong> <span style="opacity:0.4; font-size:14px;">${cols[1] || ''}</span>
                        </div>`;
                    }).join('');
                } else {
                    resBox.style.display = 'none';
                }
            } catch (e) { console.log("Laddar..."); }
        });
    </script>
</body>
</html>

<script>
    let csvData = "";
    // Hämta orten från URL:en (t.ex. /Gavle)
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const rawPath = pathParts.pop() || "Sverige";
    const targetCity = decodeURIComponent(rawPath).trim();

    // Sätt rubriken direkt
    document.getElementById('city-display').innerText = targetCity.toUpperCase() + "_SEKTOR";

    async function init() {
        try {
            // Laddar din CSV-fil
            const resp = await fetch('/Aiorter.csv?v=' + Date.now());
            const text = await resp.text();
            // Tar bort eventuella "BOM" tecken och sparar
            csvData = text.replace(/^\uFEFF/, "");
            console.log("System_Ready: Data-vault synkad.");
        } catch (e) {
            console.error("Critical_Error: Kunde inte nå Aiorter.csv");
        }
    }

    function engageAI() {
        const output = document.getElementById('ai-output');
        const grid = document.getElementById('neural-grid');
        
        // Starta laddnings-sekvensen
        document.querySelector('.search-module').style.opacity = '0.2';
        grid.classList.remove('hidden');
        
        const lines = [
            "> Initializing Mega_AI Uplink...",
            "> Bypassing Broker Firewalls...",
            "> Scraping hidden data for " + targetCity + "...",
            "> Mapping 1,000,000+ data points...",
            "> ACCESS_GRANTED."
        ];

        let i = 0;
        const interval = setInterval(() => {
            output.innerText = lines[i];
            i++;
            if (i === lines.length) {
                clearInterval(interval);
                displayMatch(); // När laddningen är klar, visa datan
            }
        }, 500);
    }

    function displayMatch() {
        const rows = csvData.split(/\r?\n/);
        let matchFound = false;

        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(';');
            // Vi kollar om första kolumnen (Orten) matchar vår URL
            if (cols[0] && cols[0].trim().toLowerCase() === targetCity.toLowerCase()) {
                const beskrivning = cols[3] ? cols[3].trim() : "Ingen utökad analys tillgänglig för denna sektor ännu.";
                
                // Uppdatera AI-rutan med den riktiga beskrivningen från din CSV
                document.getElementById('ai-output').innerHTML = `
                    <span style="color: #fff; font-weight: bold;">ANALYSRAPPORT:</span><br>
                    ${beskrivning}
                `;
                matchFound = true;
                break;
            }
        }

        if (!matchFound) {
            document.getElementById('ai-output').innerText = "> VARNING: Orten hittades inte i databasen. Genererar generisk marknadsanalys...";
        }
    }

    // Kör init när sidan laddas
    window.onload = init;

    // Klockan i hörnet
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

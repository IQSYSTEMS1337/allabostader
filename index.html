<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Vault</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --grey: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .vault-container { background: var(--grey); border: 1px solid var(--gold); padding: 2.5rem; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); width: 90%; max-width: 500px; position: relative; }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 2rem; }
        .info-box { text-align: left; background: #000; padding: 1.5rem; border-left: 3px solid var(--gold); margin-top: 1rem; }
        .label { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .data-text { font-size: 1rem; line-height: 1.5; color: #eee; margin-bottom: 1.5rem; display: block; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 2rem; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 14px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: all 0.2s; }
        button:hover { background: var(--gold); color: var(--dark); }
        #overlay { position: absolute; inset: 0; background: var(--grey); display: flex; justify-content: center; align-items: center; z-index: 10; color: var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="vault-container" id="main-vault">
    <div id="overlay">SYNKRONISERAR...</div>
    
    <div id="step-verify">
        <h1>Åtkomst Begärd</h1>
        <p style="color: #666; font-size: 0.8rem;">IDENTITETSKONTROLL FÖR:</p>
        <span id="display-city" style="font-size: 1.6rem; font-weight: bold; display: block; margin-bottom: 2rem;">Laddar...</span>
        <div class="btn-group">
            <button id="v-btn" onclick="startVerification()">Verifiera</button>
            <button onclick="location.href='https://allabostäder.se'">Avbryt</button>
        </div>
    </div>

    <div id="step-result" class="hidden">
        <h1 style="color: #4caf50;">Åtkomst Beviljad</h1>
        <div class="info-box">
            <span class="label">Region</span>
            <span id="res-kommun" class="data-text">...</span>
            
            <span class="label">Information & Analys</span>
            <span id="res-desc" class="data-text">...</span>
        </div>
        <div class="btn-group">
            <button onclick="location.reload()">Stäng Vault</button>
        </div>
    </div>
</div>

<script>
    let csvData = "";
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const rawPath = pathParts.pop() || "Gävle";
    const targetCity = decodeURIComponent(rawPath).trim();
    
    document.getElementById('display-city').innerText = targetCity;

    async function init() {
        try {
            const resp = await fetch('Aiorter.csv?v=' + Date.now(), { mode: 'cors', credentials: 'omit' });
            const text = await resp.text();
            csvData = text.replace(/^\uFEFF/, "");
            document.getElementById('overlay').style.display = 'none';
        } catch (e) {
            document.getElementById('overlay').innerText = "ANSLUTNINGSFEL";
        }
    }

    function startVerification() {
        const btn = document.getElementById('v-btn');
        btn.innerText = "DEKRYPTERAR...";
        btn.disabled = true;

        setTimeout(() => {
            const rows = csvData.split(/\r?\n/);
            let match = null;

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(';');
                if (cols[0] && cols[0].trim().toLowerCase() === targetCity.toLowerCase()) {
                    match = {
                        kommun: cols[1]?.trim() || "Okänd",
                        desc: cols[3]?.trim() || "Ingen data hittades."
                    };
                    break;
                }
            }

            if (match) {
                // ISTÄLLET FÖR REDIRECT: Byt vy direkt på sidan
                document.getElementById('res-kommun').innerText = match.kommun;
                document.getElementById('res-desc').innerText = match.desc;
                
                document.getElementById('step-verify').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
            } else {
                alert("ÅTKOMST NEKAD: Orten saknas i registret.");
                btn.innerText = "Verifiera";
                btn.disabled = false;
            }
        }, 1000);
    }
    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllaBostäder | Marknadsaggregator</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="top-bar">
    <div class="logo">ALLA<span>BOSTÄDER</span></div>
    <div class="live-indicator"><span class="dot"></span> LIVE SCAN</div>
</div>

<main class="aggregator-core">
    <div class="search-context">
        <span class="location-tag" id="city-tag">Laddar...</span>
        <h1>Hittar dolda objekt åt dig</h1>
        <p>Vi skannar 142 mäklarsajter, Hemnet och Booli för att hitta objekt som andra missar.</p>
    </div>

    <div id="action-area" class="card">
        <div class="scan-progress hidden" id="scan-v">
            <div class="bar"><div class="fill"></div></div>
            <p>Aggregerar data från lokala mäklare...</p>
        </div>
        
        <button class="btn-primary" id="start-btn" onclick="runScanner()">Starta Marknadsskanning</button>
    </div>

    <div id="results" class="hidden">
        <div class="data-grid">
            <div class="data-card">
                <label>Kommande (Dolda)</label>
                <div class="value" id="val-kommande">Söker...</div>
                <a href="#" id="link-kommande" class="btn-sub">Öppna databas</a>
            </div>
            <div class="data-card">
                <label>Prissänkta just nu</label>
                <div class="value" id="val-dropped">Söker...</div>
                <a href="#" id="link-dropped" class="btn-sub">Visa fynd</a>
            </div>
        </div>

        <div class="ai-report">
            <h3>Lokal marknadsanalys</h3>
            <p id="city-desc"></p>
        </div>
    </div>
</main>

<script>
    let csvData = "";
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const targetCity = decodeURIComponent(pathParts.pop() || "Gävle").trim();

    document.getElementById('city-tag').innerText = targetCity.toUpperCase();

    async function init() {
        const resp = await fetch('/Aiorter.csv?v=' + Date.now());
        csvData = (await resp.text()).replace(/^\uFEFF/, "");
    }

    function runScanner() {
        const btn = document.getElementById('start-btn');
        const scan = document.getElementById('scan-v');
        btn.classList.add('hidden');
        scan.classList.remove('hidden');

        setTimeout(() => {
            const rows = csvData.split(/\r?\n/);
            let match = null;
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(';');
                if (cols[0]?.trim().toLowerCase() === targetCity.toLowerCase()) {
                    match = { kommun: cols[1]?.trim(), desc: cols[3]?.trim() };
                    break;
                }
            }

            if (match) {
                const kommun = match.kommun.replace(" kommun", "");
                document.getElementById('city-desc').innerText = match.desc;
                document.getElementById('val-kommande').innerText = "TILLGÄNGLIG";
                document.getElementById('val-dropped').innerText = "AKTIV";
                
                document.getElementById('link-kommande').href = `https://www.booli.se/${encodeURIComponent(kommun)}/2/sok/?isUpcoming=1`;
                document.getElementById('link-dropped').href = `https://www.hemnet.se/bostader?location_ids=${encodeURIComponent(targetCity)}&upcoming=1`;

                scan.classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
            }
        }, 1500);
    }
    window.onload = init;
</script>
</body>
</html>

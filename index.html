<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Vault</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --grey: #1a1a1a; --green: #4caf50; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .vault-container { background: var(--grey); border: 1px solid var(--gold); padding: 2rem; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); width: 95%; max-width: 550px; position: relative; }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 1.5rem; }
        .info-box { text-align: left; background: #000; padding: 1.2rem; border-left: 3px solid var(--gold); margin-bottom: 1rem; }
        .label { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 5px; opacity: 0.8; }
        .data-text { font-size: 0.95rem; color: #eee; margin-bottom: 1rem; display: block; }
        
        /* Nya funktions-element */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 1.5rem 0; }
        .tool-btn { background: #111; border: 1px solid #333; color: #ccc; padding: 12px; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .tool-btn:hover { border-color: var(--gold); color: var(--gold); background: #1a1505; }
        
        .market-meter { height: 10px; background: #222; border-radius: 5px; margin: 10px 0; overflow: hidden; position: relative; }
        .meter-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ffeb3b, #4caf50); width: 75%; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .primary-btn { background: var(--gold); color: var(--dark); border: none; padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; width: 100%; }
        
        #overlay { position: absolute; inset: 0; background: var(--grey); display: flex; justify-content: center; align-items: center; z-index: 10; color: var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="vault-container">
    <div id="overlay">INITIERAR VERKTYG...</div>
    
    <div id="step-verify">
        <h1>Vault Access</h1>
        <span id="display-city" style="font-size: 1.6rem; font-weight: bold; display: block; margin-bottom: 2rem; color: #fff;">Laddar...</span>
        <button class="primary-btn" id="v-btn" onclick="startVerification()">Verifiera & Lås upp</button>
    </div>

    <div id="step-result" class="hidden">
        <h1 style="color: var(--green); margin-bottom: 0.5rem;">Verifierad</h1>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 1.5rem;">Data för <span id="res-city-name" style="color: #ddd;"></span> är nu tillgänglig.</p>

        <div class="info-box">
            <span class="label">Marknadens "Klipp-index"</span>
            <div class="market-meter"><div class="meter-fill"></div></div>
            <span style="font-size: 0.7rem; color: #888;">Hög chans för prissänkningar just nu.</span>
        </div>

        <div class="action-grid">
            <button class="tool-btn" onclick="openSearch('kommande')">🔍 Dolda Annonser</button>
            <button class="tool-btn" onclick="openSearch('prissänkt')">📉 Prissänkta Hem</button>
            <button class="tool-btn" onclick="alert('Genererar historisk prisrapport...')">📜 Prishistorik</button>
            <button class="tool-btn" onclick="alert('Analyserar slutpriser...')">📊 Slutpriskoll</button>
        </div>

        <div class="info-box">
            <span class="label">AI-Analys (Beskrivning)</span>
            <span id="res-desc" class="data-text" style="font-style: italic;"></span>
        </div>

        <button class="tool-btn" style="width: 100%;" onclick="location.reload()">Återställ System</button>
    </div>
</div>

<script>
    let csvData = "";
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const rawPath = pathParts.pop() || "Gävle";
    const targetCity = decodeURIComponent(rawPath).trim();
    let currentKommun = "";

    document.getElementById('display-city').innerText = targetCity;

    async function init() {
        try {
            const resp = await fetch('Aiorter.csv?v=' + Date.now(), { mode: 'cors', credentials: 'omit' });
            const text = await resp.text();
            csvData = text.replace(/^\uFEFF/, "");
            document.getElementById('overlay').style.display = 'none';
        } catch (e) {
            document.getElementById('overlay').innerText = "SYSTEMFEL";
        }
    }

    function openSearch(type) {
        let url = "";
        const city = encodeURIComponent(targetCity);
        const kommun = encodeURIComponent(currentKommun);

        if(type === 'kommande') {
            // Booli filter för kommande i kommunen
            url = `https://www.booli.se/${kommun}/2/sok/?objectType=Hus,L%C3%A4genhet&isUpcoming=1`;
        } else if(type === 'prissänkt') {
            // Hemnet filter för prissänkt i området
            url = `https://www.hemnet.se/bostader?location_ids=${city}&upcoming=1`;
        }
        window.open(url, '_blank');
    }

    function startVerification() {
        const btn = document.getElementById('v-btn');
        btn.innerText = "DEKRYPTERAR...";
        btn.disabled = true;

        setTimeout(() => {
            const rows = csvData.split(/\r?\n/);
            let match = null;

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(';');
                if (cols[0] && cols[0].trim().toLowerCase() === targetCity.toLowerCase()) {
                    match = {
                        kommun: cols[1]?.trim() || "Okänd",
                        desc: cols[3]?.trim() || "Beskrivning saknas."
                    };
                    break;
                }
            }

            if (match) {
                currentKommun = match.kommun.replace(" kommun", "");
                document.getElementById('res-city-name').innerText = targetCity + " (" + match.kommun + ")";
                document.getElementById('res-desc').innerText = match.desc;
                
                document.getElementById('step-verify').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
            } else {
                alert("Orten hittades inte.");
                btn.innerText = "Verifiera & Lås upp";
                btn.disabled = false;
            }
        }, 1200);
    }
    window.onload = init;
</script>
</body>
</html>

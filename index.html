<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">Allabostäder | Fastighetsintelligens</title>
    <meta name="description" id="dynamic-desc" content="Sök dolda bostäder och Ghost Listings innan de når Hemnet.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --black: #050505; --white: #ffffff; --accent: #007AFF; --gold: #c5a059; --dark-grey: #111; }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .aura { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,122,255,0.08) 0%, rgba(0,0,0,1) 70%); z-index: -1; }
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        h1 { font-size: clamp(40px, 10vw, 90px); font-weight: 900; letter-spacing: -4px; margin: 0; line-height: 0.9; background: linear-gradient(180deg, #fff 30%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container { width: 100%; max-width: 600px; position: relative; margin-top: 40px; }
        input { width: 100%; padding: 25px; border-radius: 50px; border: 1px solid #333; background: rgba(255,255,255,0.05); color: #fff; font-size: 18px; outline: none; backdrop-filter: blur(10px); box-sizing: border-box; }
        .results { position: absolute; top: 110%; left: 0; right: 0; background: #0a0a0a; border-radius: 20px; border: 1px solid #333; max-height: 350px; overflow-y: auto; display: none; z-index: 100; }
        .item { padding: 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .item:hover { background: #111; }
        .ghost-tag { font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        #vault-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .black-tier-vault { background: #0a0a0a; border: 1px solid #222; padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        .gold-button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-weight: 900; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <section class="hero">
        <p style="color:var(--accent); font-weight:700; letter-spacing:3px;">STEALTH MARKET ENGINE</p>
        <h1>Dolda Hem.<br>Innan Alla Andra.</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Sök stad (t.ex. Gävle)..." autocomplete="off">
            <div id="results" class="results"></div>
        </div>
    </section>

    <div id="vault-overlay">
        <div class="black-tier-vault">
            <h2 id="vH" style="color:var(--gold)">Verifiering Krävs</h2>
            <p>Låser upp exklusiva data för <span id="target-city" style="font-weight:bold"></span>.</p>
            <input type="password" id="vP" placeholder="Krypteringsnyckel" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:#fff; border-radius:10px; box-sizing:border-box;">
            <button id="vBtn" class="gold-button">Öppna Valvet</button>
            <button onclick="document.getElementById('vault-overlay').style.display='none'" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">Stäng</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('searchInput');
        const resBox = document.getElementById('results');
        const overlay = document.getElementById('vault-overlay');
        const citySpan = document.getElementById('target-city');

        let csvData = [];

        // 1. Ladda ner CSV-filen direkt när sidan startar
        async function loadCSV() {
            try {
                console.log("Försöker hämta Aiorter.csv...");
                const response = await fetch('Aiorter.csv');
                if (!response.ok) throw new Error("Kunde inte hitta Aiorter.csv - kontrollera filnamnet!");
                
                const text = await response.text();
                // Dela upp rader och hantera både Windows och Mac-brytningar
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                
                // Mappa datan (hoppa över headern)
                csvData = lines.slice(1).map(line => {
                    const columns = line.split(';');
                    return {
                        ort: columns[0]?.trim(),
                        kommun: columns[1]?.trim(),
                        title: columns[2]?.trim(),
                        desc: columns[3]?.trim()
                    };
                });
                console.log("CSV laddad! Antal orter:", csvData.length);
            } catch (err) {
                console.error("Fel:", err.message);
            }
        }

        loadCSV();

        // 2. Sökfunktion
        input.addEventListener('input', () => {
            const val = input.value.toLowerCase();
            if (val.length < 2) { resBox.style.display = 'none'; return; }

            const matches = csvData.filter(item => 
                item.ort && item.ort.toLowerCase().includes(val)
            ).slice(0, 10);

            if (matches.length > 0) {
                resBox.style.display = 'block';
                resBox.innerHTML = matches.map(m => `
                    <div class="item" onclick="openVault('${m.ort}', '${m.title}', '${m.desc}')">
                        <div>
                            <div style="font-weight:700;">${m.ort}</div>
                            <div style="font-size:12px; opacity:0.5;">${m.kommun}</div>
                        </div>
                        <span class="ghost-tag">GHOST LISTING</span>
                    </div>
                `).join('');
            } else {
                resBox.style.display = 'none';
            }
        });

        function openVault(ort, title, desc) {
            citySpan.innerText = ort;
            overlay.style.display = 'flex';
            resBox.style.display = 'none';
            if (title) document.title = title;
            if (desc) document.querySelector('meta[name="description"]').content = desc;
        }

        document.getElementById('vBtn').onclick = () => {
            document.getElementById('vH').innerText = "Åtkomst Beviljad";
            setTimeout(() => { 
                alert("Ansluter till dolda servern för " + citySpan.innerText);
                overlay.style.display = 'none';
            }, 800);
        };
    </script>
</body>
</html>

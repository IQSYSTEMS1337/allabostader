<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLABOSTÄDER // NEURAL_INTERFACE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="space-warp"></div>
<div class="mesh-gradient"></div>

<main class="omni-container">
    <nav class="top-nav">
        <div class="brand">AB<span> // OS</span></div>
        <div class="system-clock" id="clock">00:00:00</div>
    </nav>

    <section class="core-interface">
        <div class="data-halo">
            <h1 class="target-city" id="city-display">LADDAR_SYSTEM...</h1>
            <p class="status-msg">AGGREGERAR: MÄKLARE_DB, DOLDA_ARKIV, BESIKTNING_RAW</p>
        </div>

        <div class="search-module">
            <div class="input-scanner">
                <input type="text" id="target-input" placeholder="SCANNA OMRÅDE / KOORDINATER">
                <div class="scan-line"></div>
            </div>
            <button class="launch-btn" onclick="engageAI()">ENGAGE_MEGA_AI</button>
        </div>

        <div id="neural-grid" class="hidden">
            <div class="grid-row">
                <div class="data-cell">
                    <span class="label">LIVE_OBJECTS</span>
                    <div class="value">2,841</div>
                </div>
                <div class="data-cell highlight">
                    <span class="label">HIDDEN_FILES</span>
                    <div class="value">142</div>
                </div>
            </div>
            
            <div class="ai-orbital">
                <div class="orbital-ring"></div>
                <div class="oracle-text">
                    <label>MEGA_AI_ANALYSIS</label>
                    <p id="ai-output">Initierar djupskanning av dolda besiktningsprotokoll och raderade annonsbilder...</p>
                </div>
            </div>

            <div class="action-orbit">
                <button class="neuro-link" onclick="location.reload()">REBOOT_SYSTEM</button>
                <button class="neuro-link gold" onclick="window.open('https://www.booli.se')">ACCESS_ALL_DATA</button>
            </div>
        </div>
    </section>
</main>

<script>
    const city = decodeURIComponent(window.location.pathname.split('/').pop() || "Sverige");
    document.getElementById('city-display').innerText = city.toUpperCase() + "_SEKTOR";

    function engageAI() {
        document.querySelector('.search-module').style.opacity = '0.2';
        document.getElementById('neural-grid').classList.remove('hidden');
        const output = document.getElementById('ai-output');
        const lines = [
            "> Brute-forcing broker firewalls...",
            "> Scraping deleted image cache...",
            "> Recovering inspection protocols...",
            "> DATA_AGGREGATION_COMPLETE."
        ];
        let i = 0;
        const interval = setInterval(() => {
            output.innerText = lines[i];
            i++;
            if(i === lines.length) clearInterval(interval);
        }, 600);
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>

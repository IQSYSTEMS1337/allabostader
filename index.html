<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLABOSTÄDER // OMNI_V5_MEGA_AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="quantum-ready">

<div class="background-engine">
    <div class="nebula"></div>
    <div class="grid-layer"></div>
    <canvas id="neural-canvas"></canvas>
</div>

<div class="interface-layer">
    <header class="top-stratum">
        <div class="logo-core">AB<span>//OMNI</span></div>
        <div class="system-readout">
            <span class="pulse"></span> SYSTEM_LIVE // <span id="node-count">1.4M</span>_NODES_ACTIVE
        </div>
    </header>

    <main class="core-processor">
        <div class="focus-frame">
            <div class="header-logic">
                <span class="bread-crumb">ROOT / SEKTOR_SKAN / <span id="path-city">LADDAR...</span></span>
                <h1 id="city-title" class="text-glitch">INITIALIZING...</h1>
            </div>

            <div class="search-terminal">
                <div class="scanner-bar">
                    <input type="text" id="omni-search" placeholder="SKANNA HELA SVERIGE: ORT, KOMMUN, DOLDA_ADRESSER...">
                    <div class="laser-line"></div>
                </div>
                <button class="mega-btn" onclick="startDeepScan()">ENGAGE_NEURAL_SCAN</button>
            </div>

            <div id="data-matrix" class="matrix-hidden">
                <div class="stats-ribbon">
                    <div class="stat-node">
                        <label>AI_PREDICTION</label>
                        <div class="val" id="ai-index">--.-%</div>
                    </div>
                    <div class="stat-node">
                        <label>DOLD_DATA</label>
                        <div class="val" id="hidden-count">SCANNING...</div>
                    </div>
                    <div class="stat-node">
                        <label>MARKVÄRDE</label>
                        <div class="val" id="market-trend">VOLATIL</div>
                    </div>
                </div>

                <div class="main-content-split">
                    <div class="ai-terminal glass">
                        <div class="terminal-header">MEGA_AI_ORACLE_V5</div>
                        <div id="ai-log" class="typewriter"></div>
                    </div>
                    
                    <div class="action-nexus">
                        <a href="#" id="btn-hemnet" class="nexus-link">LINK_HEMNET_DB</a>
                        <a href="#" id="btn-booli" class="nexus-link">LINK_BOOLI_DB</a>
                        <a href="#" class="nexus-link premium">UNLOCK_HIDDEN_DOCS</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let csvData = "";
    const cityFromURL = decodeURIComponent(window.location.pathname.split('/').pop() || "Gävle");
    
    document.getElementById('path-city').innerText = cityFromURL.toUpperCase();
    document.getElementById('city-title').innerText = cityFromURL.toUpperCase() + "_SECTOR";

    async function init() {
        const resp = await fetch('/Aiorter.csv?v=' + Date.now());
        csvData = (await resp.text()).replace(/^\uFEFF/, "");
        // Simulerar laddning av noder
        let nodes = 1400000;
        setInterval(() => {
            nodes += Math.floor(Math.random() * 10);
            document.getElementById('node-count').innerText = (nodes / 1000000).toFixed(3) + "M";
        }, 1000);
    }

    function startDeepScan() {
        const matrix = document.getElementById('data-matrix');
        const log = document.getElementById('ai-log');
        matrix.classList.remove('matrix-hidden');
        matrix.classList.add('matrix-visible');
        
        let i = 0;
        const scanSteps = [
            "> Initializing Quantum Uplink...",
            "> Bypassing Broker API limits...",
            "> Scraping hidden_inspection_protocols...",
            "> Recovering deleted_listing_media...",
            "> Analysis complete for " + cityFromURL
        ];

        const timer = setInterval(() => {
            log.innerHTML += `<p>${scanSteps[i]}</p>`;
            i++;
            if(i === scanSteps.length) {
                clearInterval(timer);
                renderData();
            }
        }, 400);
    }

    function renderData() {
        const rows = csvData.split(/\r?\n/);
        const match = rows.find(r => r.split(';')[0]?.trim().toLowerCase() === cityFromURL.toLowerCase());
        
        if(match) {
            const cols = match.split(';');
            document.getElementById('ai-log').innerHTML += `<div class='final-desc'>${cols[3]}</div>`;
            document.getElementById('ai-index').innerText = (Math.random() * (98 - 85) + 85).toFixed(1) + "%";
            document.getElementById('hidden-count').innerText = Math.floor(Math.random() * 500) + " FILER";
            
            const kommun = cols[1]?.replace(" kommun", "") || cityFromURL;
            document.getElementById('btn-hemnet').href = `https://www.hemnet.se/bostader?location_ids=${encodeURIComponent(cityFromURL)}`;
            document.getElementById('btn-booli').href = `https://www.booli.se/${encodeURIComponent(kommun)}`;
        }
    }

    window.onload = init;
</script>
</body>
</html>

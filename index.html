<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Vault</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --grey: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .vault-container { background: var(--grey); border: 1px solid var(--gold); padding: 2.5rem; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); width: 400px; position: relative; }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 2rem; }
        .location-info { margin-bottom: 2.5rem; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 1.5rem 0; }
        .city-name { display: block; font-size: 1.6rem; color: #fff; font-weight: bold; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 14px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: all 0.2s; }
        button:hover { background: var(--gold); color: var(--dark); }
        button:disabled { border-color: #444; color: #444; }
        #overlay { position: absolute; inset: 0; background: var(--grey); display: flex; justify-content: center; align-items: center; z-index: 10; color: var(--gold); }
    </style>
</head>
<body>

<div class="vault-container">
    <div id="overlay">SYNKRONISERAR MED SKUGGNÄTVERKET...</div>
    <h1>Åtkomst Begärd</h1>
    <div class="location-info">
        <span id="display-city" class="city-name">Laddar...</span>
    </div>
    <div class="btn-group">
        <button id="v-btn" onclick="startVerification()">Verifiera</button>
        <button onclick="location.href='/'">Avbryt</button>
    </div>
</div>

<script>
    let csvData = "";
    
    // Hämta stad från URL
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const rawPath = pathParts.pop() || "Gävle";
    const targetCityDisplay = decodeURIComponent(rawPath);
    const targetCityLower = targetCityDisplay.trim().toLowerCase();
    
    document.getElementById('display-city').innerText = targetCityDisplay;

    async function init() {
        try {
            const resp = await fetch('Aiorter.csv?v=' + Date.now(), { mode: 'cors', credentials: 'omit' });
            const text = await resp.text();
            csvData = text.replace(/^\uFEFF/, "");
            document.getElementById('overlay').style.display = 'none';
        } catch (e) {
            document.getElementById('overlay').innerText = "ANSLUTNINGSFEL";
        }
    }

    function startVerification() {
        const btn = document.getElementById('v-btn');
        btn.innerText = "DEKRYPTERAR...";
        btn.disabled = true;

        setTimeout(() => {
            const rows = csvData.split(/\r?\n/);
            let found = false;

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(';');
                if (cols[0] && cols[0].trim().toLowerCase() === targetCityLower) {
                    found = true;
                    break;
                }
            }

            if (found) {
                // VIDAREBEFORDRING: Skickar till t.ex. /Gävle-info
                const targetUrl = "/" + encodeURIComponent(targetCityDisplay) + "-info";
                window.location.href = targetUrl;
            } else {
                alert("ÅTKOMST NEKAD: Orten hittades inte i databasen.");
                btn.innerText = "Verifiera";
                btn.disabled = false;
            }
        }, 1200);
    }
    window.onload = init;
</script>
</body>
</html>

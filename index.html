<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Vault</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --grey: #1a1a1a; }
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .vault-container { 
            background: var(--grey); 
            border: 1px solid var(--gold); 
            padding: 2.5rem; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); 
            width: 400px; 
            position: relative;
        }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 2rem; }
        .location-info { margin-bottom: 2.5rem; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 1.5rem 0; }
        .city-label { color: #666; font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .city-name { display: block; font-size: 1.6rem; color: #fff; font-weight: bold; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { 
            background: transparent; 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            padding: 14px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; 
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        button:hover { background: var(--gold); color: var(--dark); }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        #overlay { 
            position: absolute; 
            inset: 0; 
            background: var(--grey); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 10;
            font-size: 0.8rem;
            color: var(--gold);
        }
    </style>
</head>
<body>

<div class="vault-container">
    <div id="overlay">SYNKRONISERAR MED SKUGGNÄTVERKET...</div>
    
    <h1>Åtkomst Begärd</h1>
    
    <div class="location-info">
        <span class="city-label">Verifiera identitet för:</span>
        <span id="display-city" class="city-name">Laddar...</span>
    </div>

    <div class="btn-group">
        <button id="v-btn" onclick="startVerification()">Verifiera</button>
        <button onclick="location.href='/'">Avbryt</button>
    </div>
</div>

<script>
    let csvData = "";
    
    // Hämta stad från URL
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const rawPath = pathParts.pop() || "Gävle";
    const targetCity = decodeURIComponent(rawPath).trim().toLowerCase();
    
    document.getElementById('display-city').innerText = decodeURIComponent(rawPath);

    async function init() {
        const overlay = document.getElementById('overlay');
        try {
            // Chrome-fix: credentials 'omit' och cache-busting
            const resp = await fetch('Aiorter.csv?v=' + Date.now(), { 
                mode: 'cors',
                credentials: 'omit'
            });
            
            if (!resp.ok) throw new Error("Kunde inte läsa databas");
            
            const text = await resp.text();
            // Tvätta bort BOM-tecken (osynlig skit i början av filen)
            csvData = text.replace(/^\uFEFF/, "");
            
            overlay.style.display = 'none';
            console.log("Databas synkad.");
        } catch (e) {
            overlay.innerText = "ANSLUTNINGSFEL: BLOCKERAT AV WEBBLÄSARE";
            console.error(e);
        }
    }

    function startVerification() {
        const btn = document.getElementById('v-btn');
        btn.innerText = "DEKRYPTERAR...";
        btn.disabled = true;

        setTimeout(() => {
            if (!csvData) {
                alert("Kunde inte läsa databasen. Prova att ladda om sidan.");
                btn.innerText = "Verifiera";
                btn.disabled = false;
                return;
            }

            const rows = csvData.split(/\r?\n/);
            let match = null;

            // Loopa rader (hoppa över rubrik)
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(';');
                if (cols[0] && cols[0].trim().toLowerCase() === targetCity) {
                    match = {
                        city: cols[0].trim(),
                        kommun: cols[1] ? cols[1].trim() : "Okänd kommun",
                        title: cols[2] ? cols[2].trim() : "",
                        desc: cols[3] ? cols[3].trim() : "Ingen data tillgänglig."
                    };
                    break;
                }
            }

            if (match) {
                btn.innerText = "VERIFIERAD";
                alert(`ÅTKOMST BEVILJAD\n\nIdentitet: ${match.city}\nRegion: ${match.kommun}\n\nStatus: ${match.desc}`);
            } else {
                alert(`ÅTKOMST NEKAD\n\nKunde inte hitta '${targetCity}' i databasen.`);
                btn.innerText = "Verifiera";
                btn.disabled = false;
            }
        }, 1000);
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allabostäder | Neural Fastighetsmotor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --bg: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.9);
            --border: rgba(212, 175, 55, 0.2);
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: var(--bg); color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        /* HEADER */
        header {
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.5);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 50px; border-radius: 5px; }
        .brand { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.4rem; letter-spacing: 2px; }

        /* HERO & SEARCH */
        .hero { max-width: 900px; margin: 100px auto 50px; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 700; letter-spacing: -1px; }
        .hero span { color: var(--gold); }

        .search-box {
            position: relative; max-width: 700px; margin: 0 auto;
            background: var(--glass); border: 1px solid var(--border);
            display: flex; align-items: center; transition: 0.4s;
        }
        .search-box:focus-within { border-color: var(--gold); box-shadow: 0 0 40px var(--gold-glow); }
        
        input {
            flex: 1; background: transparent; border: none; padding: 25px;
            color: #fff; font-size: 1.2rem; outline: none;
        }

        .btn-search {
            background: var(--gold); color: #000; border: none; padding: 25px 40px;
            font-weight: 700; cursor: pointer; font-family: 'Plus Jakarta Sans';
        }

        /* RESULTAT */
        #matrix { display: none; max-width: 1000px; margin: 50px auto; padding: 40px; background: var(--glass); border: 1px solid var(--border); }
        .city-title { font-family: 'Cinzel'; color: var(--gold); font-size: 2.5rem; margin-bottom: 10px; }
        
        .grid-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        .link-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 20px; color: #fff; text-decoration: none; text-align: center;
            font-size: 0.8rem; font-weight: 700; transition: 0.3s;
        }
        .link-item:hover { background: var(--gold); color: #000; }

        /* DROPDOWN */
        .autocomplete {
            position: absolute; top: 100%; left: -1px; right: -1px;
            background: #111; border: 1px solid var(--gold); z-index: 100;
            display: none; max-height: 300px; overflow-y: auto;
        }
        .auto-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .auto-item:hover { background: var(--gold); color: #000; }

        footer { margin-top: 100px; padding: 40px; text-align: center; opacity: 0.4; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="image_0.png" alt="Logo" onerror="this.style.display='none'">
        <div class="brand">ALLABOSTÄDER</div>
    </div>
    <div style="font-size: 0.6rem; color: var(--gold);">SYSTEM_STATUS: ONLINE</div>
</header>

<div class="hero">
    <h1>Neural Sökning. <br><span>Hela Marknaden.</span></h1>
    <div class="search-box">
        <input type="text" id="search-in" placeholder="Skriv in stad (t.ex. Gävle)..." autocomplete="off">
        <button class="btn-search" onclick="runSearch()">ANALYS</button>
        <div class="autocomplete" id="auto-box"></div>
    </div>
</div>

<div id="matrix">
    <h2 id="res-city" class="city-title">STAD</h2>
    <p id="res-desc" style="color: #888; line-height: 1.6;"></p>
    
    <div class="grid-links">
        <a href="#" id="h-link" class="link-item" target="_blank">HEMNET</a>
        <a href="#" id="b-link" class="link-item" target="_blank">BOOLI</a>
        <a href="#" id="f-link" class="link-item" target="_blank">FASTIGHETSBYRÅN</a>
        <a href="#" id="s-link" class="link-item" target="_blank">SVENSK FAST</a>
        <a href="#" class="link-item" style="border-color:#fff;" onclick="alert('Skannar dolda filer...')">UNMASK DATA</a>
    </div>
</div>

<footer>
    <p>ALLABOSTÄDER © 2026 | Oberoende Fastighetsaggregator | Gävle Elite Division</p>
</footer>

<script>
    let locations = [];

    // Ladda data
    async function init() {
        try {
            const r = await fetch('Aiorter.csv');
            const t = await r.text();
            locations = t.split('\n').slice(1).map(row => {
                const cols = row.split(';');
                return { ort: cols[0]?.trim(), kommun: cols[1]?.trim(), desc: cols[3]?.trim() };
            }).filter(x => x.ort);
            console.log("Data laddad:", locations.length);
        } catch (e) {
            console.log("Kunde inte ladda CSV, kör manuellt läge.");
        }
    }

    const input = document.getElementById('search-in');
    const auto = document.getElementById('auto-box');

    input.addEventListener('input', () => {
        const val = input.value.toLowerCase();
        auto.innerHTML = '';
        if (val.length < 1) { auto.style.display = 'none'; return; }

        const hits = locations.filter(x => x.ort.toLowerCase().includes(val)).slice(0, 5);
        if (hits.length > 0) {
            hits.forEach(h => {
                const d = document.createElement('div');
                d.className = 'auto-item';
                d.innerHTML = `<span>${h.ort}</span><small>${h.kommun}</small>`;
                d.onclick = () => { input.value = h.ort; auto.style.display = 'none'; runSearch(); };
                auto.appendChild(d);
            });
            auto.style.display = 'block';
        }
    });

    function runSearch() {
        const val = input.value.trim();
        const data = locations.find(x => x.ort.toLowerCase() === val.toLowerCase()) || { ort: val, kommun: "", desc: "Skannar realtidsdata för sektorn..." };

        document.getElementById('matrix').style.display = 'block';
        document.getElementById('res-city').innerText = data.ort.toUpperCase();
        document.getElementById('res-desc').innerText = data.desc;

        // Länkar
        const q = encodeURIComponent(data.ort);
        document.getElementById('h-link').href = `https://www.hemnet.se/bostader?location_ids=${q}`;
        document.getElementById('b-link').href = `https://www.booli.se/sok?q=${q}`;
        document.getElementById('f-link').href = `https://www.fastighetsbyran.com/sv/sverige/sokresultat/?searchTerm=${q}`;
        document.getElementById('s-link').href = `https://www.svenskfast.se/bostad/sok/${q}`;

        auto.style.display = 'none';
        window.scrollTo({ top: document.getElementById('matrix').offsetTop - 50, behavior: 'smooth' });
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Vault</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --grey: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .vault-container { background: var(--grey); border: 1px solid var(--gold); padding: 2.5rem; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); width: 400px; }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 2rem; }
        .location-info { margin-bottom: 2.5rem; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 1rem 0; }
        .city-name { display: block; font-size: 1.4rem; color: #fff; margin-top: 5px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover { background: var(--gold); color: var(--dark); }
        button:disabled { border-color: #444; color: #444; }
        #overlay { position: fixed; inset: 0; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="overlay">SYNKRONISERAR...</div>

<div class="vault-container">
    <h1>Åtkomst Begärd</h1>
    <div class="location-info">
        <span id="display-city" class="city-name">Laddar...</span>
    </div>
    <div class="btn-group">
        <button id="v-btn" onclick="startVerification()">Verifiera</button>
        <button onclick="location.href='/'">Avbryt</button>
    </div>
</div>

<script>
    let csvData = "";
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const currentPath = pathParts.pop() || "Gävle";
    const targetCity = decodeURIComponent(currentPath).trim().toLowerCase();
    
    document.getElementById('display-city').innerText = decodeURIComponent(currentPath);

    async function init() {
        try {
            // Vi lägger till en timestamp för att tvinga färsk data
            const resp = await fetch('Aiorter.csv?v=' + Date.now(), { mode: 'cors' });
            if (!resp.ok) throw new Error("Kunde inte hämta filen");
            
            let text = await resp.text();
            // VIKTIGT: Ta bort osynliga tecken (BOM) i början av filen
            csvData = text.replace(/^\uFEFF/, ""); 
            
            document.getElementById('overlay').style.display = 'none';
        } catch (e) {
            document.getElementById('overlay').innerText = "SYSTEMFEL: Blockeras av webbläsaren eller saknas.";
            console.error(e);
        }
    }

    function startVerification() {
        if (!csvData) {
            alert("Databasen har inte laddats än. Vänta 2 sekunder.");
            return;
        }

        const btn = document.getElementById('v-btn');
        btn.innerText = "DEKRYPTERAR...";
        btn.disabled = true;

        setTimeout(() => {
            const rows = csvData.split(/\r?\n/);
            let match = null;

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(';');
                if (cols[0] && cols[0].trim().toLowerCase() === targetCity) {
                    match = {
                        city: cols[0].trim(),
                        kommun: cols[1] ? cols[1].trim() : "Okänd",
                        desc: cols[3] ? cols[3].trim() : "Beskrivning saknas."
                    };
                    break;
                }
            }

            if (match) {
                alert(`BEVILJAD\n\nIdentitet: ${match.city}\nKommun: ${match.kommun}\n\nInfo: ${match.desc}`);
                btn.innerText = "Verifierad";
            } else {
                alert(`NEKAD\n\nKunde inte hitta '${targetCity}' i databasen.`);
                btn.innerText = "Verifiera";
                btn.disabled = false;
            }
        }, 800);
    }

    window.onload = init;
</script>
</body>
</html>

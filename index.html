<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLABOSTÄDER // OMNI_V7_INTEGRATED</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
            --font-tech: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; color: #fff;
            font-family: var(--font-body); overflow: hidden;
        }

        /* ELON-LEVEL BACKGROUND */
        .bg-container {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0d0628 0%, #000 100%);
        }

        .grid-overlay {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(1000px) rotateX(60deg) translateY(-100px);
        }

        .wrapper {
            position: relative; z-index: 10;
            height: 100vh; display: flex; flex-direction: column;
            padding: 40px; box-sizing: border-box;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px;
        }

        .logo { font-family: var(--font-tech); font-weight: 700; letter-spacing: 5px; }
        .logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* THE HUB */
        .main-hub {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            max-width: 1000px; margin: 0 auto; width: 100%;
        }

        h1 { 
            font-family: var(--font-tech); font-size: 3.5rem; text-align: center;
            letter-spacing: -3px; margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* SEARCH INTERFACE */
        .omni-search-box {
            width: 100%; position: relative;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .omni-search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        input {
            width: 100%; background: transparent; border: none; padding: 35px;
            color: #fff; font-family: var(--font-tech); font-size: 1.1rem;
            outline: none; text-align: center; letter-spacing: 2px;
        }

        .laser-scan {
            position: absolute; bottom: 0; left: 0; height: 1px; width: 0;
            background: var(--accent); box-shadow: 0 0 15px var(--accent);
        }

        /* MATRIX/RESULTS */
        #matrix {
            display: none; width: 100%; margin-top: 40px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .data-header { font-family: var(--font-tech); color: var(--accent); font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 20px; text-align: center;}

        .terminal-window {
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.05);
            padding: 30px; border-radius: 4px; position: relative;
        }

        .ai-text {
            color: #fff; font-size: 1.2rem; line-height: 1.8;
            font-weight: 300; margin-bottom: 30px;
        }

        .link-bar { display: flex; gap: 15px; }
        .btn-link {
            flex: 1; padding: 20px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; text-decoration: none; text-align: center;
            font-family: var(--font-tech); font-size: 0.7rem; transition: 0.3s;
        }
        .btn-link:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-link.gold { border-color: var(--gold); color: var(--gold); }
        .btn-link.gold:hover { background: var(--gold); color: #000; }

    </style>
</head>
<body>

<div class="bg-container">
    <div class="grid-overlay"></div>
</div>

<div class="wrapper">
    <header>
        <div class="logo">ALLA<span>BOSTÄDER</span></div>
        <div class="system-status">CORE_ENGINE_V7 // ACTIVE</div>
    </header>

    <main class="main-hub">
        <h1 id="main-title">OMNI_SEARCH</h1>

        <div class="omni-search-box">
            <input type="text" id="city-input" placeholder="ANGE STAD FÖR FULLSTÄNDIG SKANNING..." autocomplete="off">
            <div class="laser-scan" id="laser"></div>
        </div>

        <div id="matrix">
            <div class="data-header" id="data-city-tag">DATA_SOURCE: UNKNOWN</div>
            <div class="terminal-window">
                <div class="ai-text" id="ai-description">Initierar neural länk...</div>
                <div class="link-bar">
                    <a href="#" class="btn-link" id="link-h" target="_blank">HEMNET_DATA</a>
                    <a href="#" class="btn-link" id="link-b" target="_blank">BOOLI_DATA</a>
                    <a href="#" class="btn-link gold">UNMASK_HIDDEN_FILES</a>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let csvData = "";
    const input = document.getElementById('city-input');
    const laser = document.getElementById('laser');
    const matrix = document.getElementById('matrix');
    const title = document.getElementById('main-title');

    // Ladda din fil direkt vid start
    async function loadVault() {
        try {
            const resp = await fetch('/Aiorter.csv?v=' + Date.now());
            csvData = (await resp.text()).replace(/^\uFEFF/, "");
            console.log("Vault loaded.");
        } catch(e) { console.error("Could not load Aiorter.csv"); }
    }

    // När man trycker på Enter i sökrutan
    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            executeScan(this.value);
        }
    });

    // Skannings-animation
    function executeScan(val) {
        if(!val) return;
        
        laser.style.width = '100%';
        laser.style.transition = '2s cubic-bezier(0.4, 0, 0.2, 1)';
        title.innerText = "SCANNING_SECTOR...";
        
        setTimeout(() => {
            laser.style.width = '0%';
            laser.style.transition = '0s';
            processResult(val);
        }, 2000);
    }

    function processResult(val) {
        const rows = csvData.split(/\r?\n/);
        const match = rows.find(r => r.split(';')[0]?.trim().toLowerCase() === val.toLowerCase());

        matrix.style.display = 'block';
        title.innerText = val.toUpperCase();
        document.getElementById('data-city-tag').innerText = "DATA_SOURCE: " + val.toUpperCase() + "_ARKIV";

        if(match) {
            const cols = match.split(';');
            document.getElementById('ai-description').innerText = cols[3] || "Data saknas i beskrivningsfältet.";
            
            // Koppla länkarna
            const kommun = cols[1]?.replace(" kommun", "") || val;
            document.getElementById('link-h').href = `https://www.hemnet.se/bostader?location_ids=${encodeURIComponent(val)}`;
            document.getElementById('link-b').href = `https://www.booli.se/sok?q=${encodeURIComponent(kommun)}`;
        } else {
            document.getElementById('ai-description').innerText = "VARNING: Sektorn hittades inte i Aiorter.csv. Försöker hämta rådata från publika nätverk...";
        }
    }

    window.onload = loadVault;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Vault</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --grey: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .vault-container { background: var(--grey); border: 1px solid var(--gold); padding: 2.5rem; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); width: 380px; }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 2rem; }
        .location-info { margin-bottom: 2.5rem; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 1rem 0; }
        .city-label { color: #666; font-size: 0.8rem; text-transform: uppercase; }
        .city-name { display: block; font-size: 1.4rem; color: #fff; margin-top: 5px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover { background: var(--gold); color: var(--dark); }
        button:disabled { border-color: #444; color: #444; }
        #overlay { position: fixed; inset: 0; background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="overlay">SYNKRONISERAR MED SKUGGNÄTVERKET...</div>

<div class="vault-container">
    <h1>Åtkomst Begärd</h1>
    <div class="location-info">
        <span class="city-label">Verifiera identitet för:</span>
        <span id="display-city" class="city-name">Laddar...</span>
    </div>
    <div class="btn-group">
        <button id="v-btn" onclick="startVerification()">Verifiera</button>
        <button onclick="location.href='/'">Avbryt</button>
    </div>
</div>

<script>
    let rawData = "";
    // Hämta ort från URL (t.ex. allabostäder.se/Gävle)
    const currentPath = window.location.pathname.split('/').filter(p => p).pop() || "Gävle";
    const targetCity = decodeURIComponent(currentPath).trim();
    document.getElementById('display-city').innerText = targetCity;

    async function init() {
        try {
            // Anropar filen via din nya Worker med CORS-stöd
            const resp = await fetch('Aiorter.csv');
            if (!resp.ok) throw new Error();
            rawData = await resp.text();
            document.getElementById('overlay').style.display = 'none';
        } catch (e) {
            document.getElementById('overlay').innerText = "ANSLUTNINGSFEL: Kontrollera Aiorter.csv";
        }
    }

    function startVerification() {
        const btn = document.getElementById('v-btn');
        btn.innerText = "DEKRYPTERAR...";
        btn.disabled = true;

        setTimeout(() => {
            const rows = rawData.split('\n');
            let foundMatch = null;

            for (let row of rows) {
                // Prova både semikolon och kommatecken som separator
                const columns = row.includes(';') ? row.split(';') : row.split(',');
                const cityNameInFile = columns[0] ? columns[0].trim() : "";

                if (cityNameInFile.toLowerCase() === targetCity.toLowerCase()) {
                    foundMatch = columns.slice(1).join(' ').trim();
                    break;
                }
            }

            if (foundMatch) {
                alert("ÅTKOMST BEVILJAD\n\nIdentitet: " + targetCity + "\nData: " + foundMatch);
            } else {
                alert("ÅTKOMST NEKAD\n\nKunde inte matcha '" + targetCity + "' i databasen.");
                btn.innerText = "Verifiera";
                btn.disabled = false;
            }
        }, 1200);
    }

    window.onload = init;
</script>
</body>
</html>

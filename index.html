<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllaBostäder | Shadow Vault</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --grey: #151515; --green: #00ff41; --red: #ff3131; }
        
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Bakgrundseffekt */
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }

        .vault-container { 
            background: rgba(26, 26, 26, 0.95); 
            border: 2px solid var(--gold); 
            padding: 2.5rem; 
            text-align: center; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); 
            width: 95%; 
            max-width: 600px; 
            position: relative;
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 6px; font-size: 1.2rem; margin-bottom: 2rem; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        .info-box { text-align: left; background: #000; padding: 1.5rem; border-left: 4px solid var(--gold); margin-bottom: 1.2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        
        .label { color: var(--gold); font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 8px; font-weight: bold; }
        
        .data-text { font-size: 1rem; color: #fff; line-height: 1.5; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 2rem 0; }
        
        .tool-btn { 
            background: #000; 
            border: 1px solid #444; 
            color: #aaa; 
            padding: 15px; 
            font-size: 0.8rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .tool-btn:hover { border-color: var(--gold); color: #fff; background: #221a05; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }

        /* Mätaren */
        .market-meter { height: 12px; background: #222; border-radius: 2px; margin: 15px 0; overflow: hidden; border: 1px solid #333; }
        .meter-fill { height: 100%; background: linear-gradient(90deg, var(--red), #ffeb3b, var(--green)); width: 0%; transition: width 2s cubic-bezier(0.1, 0, 0.3, 1); }

        .primary-btn { 
            background: var(--gold); 
            color: var(--dark); 
            border: none; 
            padding: 20px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: 900; 
            width: 100%; 
            font-size: 1rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        
        .primary-btn:hover { background: #fff; transform: scale(1.02); }
        .primary-btn:disabled { background: #555; cursor: wait; }

        #overlay { position: absolute; inset: 0; background: var(--dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: var(--gold); font-weight: bold; }
        .hidden { display: none !important; }

        .scanline { width: 100%; height: 2px; background: rgba(212, 175, 55, 0.1); position: absolute; top: 0; left: 0; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="vault-container">
    <div class="scanline"></div>
    <div id="overlay">
        <div class="spinner"></div>
        <p id="status-text">INITIERAR SYSTEM...</p>
    </div>
    
    <div id="step-verify">
        <h1>Bostadsvalv</h1>
        <span id="display-city" style="font-size: 2.2rem; font-weight: bold; display: block; margin-bottom: 2.5rem; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2);">---</span>
        <button class="primary-btn" id="v-btn" onclick="startVerification()">Dekryptera Data</button>
    </div>

    <div id="step-result" class="hidden">
        <h1 style="color: var(--green); font-size: 1rem;">Åtkomst Beviljad</h1>
        <p id="res-city-name" style="font-size: 1.2rem; color: #fff; margin-bottom: 2rem;"></p>

        <div class="info-box">
            <span class="label">AI Marknads-analys</span>
            <div class="market-meter"><div id="fill" class="meter-fill"></div></div>
            <span id="res-desc" class="data-text"></span>
        </div>

        <div class="action-grid">
            <button class="tool-btn" onclick="openSearch('kommande')">🔍 Kommande</button>
            <button class="tool-btn" onclick="openSearch('prissankt')">📉 Prisras</button>
            <button class="tool-btn" onclick="openSearch('hemnet')">🏠 Hemnet</button>
            <button class="tool-btn" onclick="openSearch('booli')">💎 Booli</button>
        </div>

        <button class="tool-btn" style="width: 100%; border-color: #333;" onclick="location.reload()">Logga ut</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    let csvData = "";
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const targetCity = decodeURIComponent(pathParts.pop() || "Gävle").trim();
    let currentKommun = "";

    // Matrix Bakgrund
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "01010101ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#d4af37";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    document.getElementById('display-city').innerText = targetCity;

    async function init() {
        try {
            const resp = await fetch('/Aiorter.csv?v=' + Date.now());
            csvData = (await resp.text()).replace(/^\uFEFF/, "");
            document.getElementById('overlay').classList.add('hidden');
        } catch (e) {
            document.getElementById('status-text').innerText = "CONNECTION ERROR";
            document.getElementById('status-text').style.color = "red";
        }
    }

    function openSearch(type) {
        let url = "";
        const city = encodeURIComponent(targetCity);
        const kommun = encodeURIComponent(currentKommun + " kommun");

        if(type === 'kommande') {
            url = `https://www.booli.se/${encodeURIComponent(currentKommun)}/2/sok/?objectType=Hus,L%C3%A4genhet&isUpcoming=1`;
        } else if(type === 'prissankt') {
            url = `https://www.hemnet.se/bostader?location_ids=${city}&upcoming=1`;
        } else if(type === 'hemnet') {
            url = `https://www.hemnet.se/bostader?location_ids=${city}`;
        } else if(type === 'booli') {
            url = `https://www.booli.se/sok?q=${city}`;
        }
        window.open(url, '_blank');
    }

    function startVerification() {
        const btn = document.getElementById('v-btn');
        btn.innerText = "BYPASSING FIREWALL...";
        btn.disabled = true;

        setTimeout(() => {
            const rows = csvData.split(/\r?\n/);
            let match = null;
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(';');
                if (cols[0] && cols[0].trim().toLowerCase() === targetCity.toLowerCase()) {
                    match = { kommun: cols[1]?.trim() || "Okänd", desc: cols[3]?.trim() || "Ingen data." };
                    break;
                }
            }

            if (match) {
                currentKommun = match.kommun.replace(" kommun", "");
                document.getElementById('res-city-name').innerText = targetCity.toUpperCase() + " SEKTOR [" + match.kommun.toUpperCase() + "]";
                document.getElementById('res-desc').innerText = match.desc;
                document.getElementById('step-verify').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
                setTimeout(() => { document.getElementById('fill').style.width = (Math.random() * (95 - 60) + 60) + "%"; }, 200);
            } else {
                alert("SYSTEM ERROR: Orten hittades inte i databasen.");
                btn.innerText = "Dekryptera Data";
                btn.disabled = false;
            }
        }, 1500);
    }
    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allabostäder | Institutional Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #050507;
            --glass: rgba(15, 15, 18, 0.98);
            --border: rgba(212, 175, 55, 0.3);
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 10%, #1a1a25 0%, #050507 80%);
            color: #fff; font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* HEADER & LOGO */
        header {
            padding: 60px 20px; display: flex; flex-direction: column; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8);
        }
        .main-logo {
            max-width: 500px; width: 90%; height: auto;
            display: block; margin: 0 auto;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.2));
        }

        /* HERO & SEARCH */
        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        
        .hero-h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 15px; letter-spacing: -1px; }
        .hero-h1 span { color: var(--gold); }
        .hero-p { color: #888; font-size: 1.1rem; margin-bottom: 50px; }

        .search-wrap {
            position: relative; max-width: 750px; margin: 0 auto;
            background: var(--glass); border: 2px solid var(--border);
            display: flex; align-items: center; border-radius: 4px;
        }
        
        input {
            flex: 1; background: transparent; border: none; padding: 25px;
            color: #fff; font-size: 1.2rem; outline: none; font-family: inherit;
        }

        .btn-main {
            background: #fff; color: #000; border: none; padding: 25px 45px;
            font-weight: 800; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-main:hover { background: var(--gold); }

        /* RESULTAT AREA */
        #results { display: none; margin-top: 80px; text-align: left; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sector-box {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            padding: 50px; position: relative;
        }
        .city-title { font-size: 3rem; margin: 0 0 20px 0; color: #fff; border-bottom: 3px solid var(--gold); display: inline-block; }

        /* 300 NODES GRID */
        .node-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px; margin-top: 50px;
        }
        .node {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 12px; font-size: 0.65rem; color: #666; text-decoration: none;
            text-align: center; text-transform: uppercase; font-weight: 600;
        }
        .node:hover { border-color: var(--gold); color: var(--gold); }

        /* AUTOCOMPLETE */
        .auto-box {
            position: absolute; top: 100%; left: -2px; right: -2px;
            background: #0d0d0f; border: 2px solid var(--gold); z-index: 100;
            display: none; max-height: 300px; overflow-y: auto;
        }
        .auto-item { padding: 20px; cursor: pointer; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; }
        .auto-item:hover { background: var(--gold); color: #000; }

        footer { margin-top: 100px; padding: 40px; text-align: center; border-top: 1px solid #111; font-size: 0.75rem; color: #444; }
    </style>
</head>
<body>

<header>
    <img src="image_0.png" alt="Logo" class="main-logo" onerror="this.src='https://via.placeholder.com/400x150?text=LOGOTYP+SAKNAS'">
</header>

<div class="container">
    <h1 class="hero-h1">Institutionell <span>Fastighetsdata.</span></h1>
    <p class="hero-p">Neural aggregation av 300+ marknadskällor i realtid.</p>

    <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Ange stad (t.ex. Gävle)..." autocomplete="off">
        <button class="btn-main" onclick="runEngine()">Analysera</button>
        <div class="auto-box" id="auto-box"></div>
    </div>

    <div id="results">
        <div class="sector-box">
            <h2 id="res-city" class="city-title">STAD</h2>
            <p id="res-desc" style="color: #aaa; max-width: 800px; line-height: 1.8;"></p>
            
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <a href="#" id="h-link" target="_blank" class="btn-main" style="padding: 15px 25px; font-size: 0.8rem;">HEMNET</a>
                <a href="#" id="b-link" target="_blank" class="btn-main" style="padding: 15px 25px; font-size: 0.8rem; background: var(--gold);">BOOLI</a>
            </div>

            <div class="node-grid" id="node-grid"></div>
        </div>
    </div>
</div>

<footer>
    ALLABOSTÄDER | Oberoende Teknisk Aggregator © 2026
</footer>

<script>
    // En förenklad men massiv lista på aktörer
    const brokers = ["Fastighetsbyrån", "Svensk Fast", "Länsförsäkringar", "Bjurfors", "Mäklarhuset", "SkandiaMäklarna", "HusmanHagberg", "Notar", "Mäklarringen", "ERA Sweden", "Svenska Mäklarhuset", "Hemverket", "MOHV", "Boneo", "Residence", "Skeppsholmen", "Wrede", "Fantastic Frank", "Historiska Hem", "Alexander White", "Widerlöv", "Riksmäklaren", "Edward Partners", "Innerstadsspecialisten", "Stadshem", "Alvhem", "Lundin", "Våningen & Villan", "3Etage", "Valvet", "Landgren", "BoSthlm", "Unik Fastighet", "Nestor", "Sjönära", "Magnusson", "Entrance", "Aspington", "Bostad&Co", "Din Mäklare", "Karlsson Uddare", "Nyvy", "Place", "Veranda", "Westside", "Heimstaden", "Balder", "Castellum", "Vasakronan", "SBB", "Wallenstam", "Fabege", "Corem", "Hemsö", "Nyfosa", "Klövern", "Akelius", "Victoriahem", "JM", "Bonava", "Peab", "Skanska", "Riksbyggen", "HSB", "BoKlok", "Magnolia", "Ikano", "Myresjöhus", "A-hus", "Fiskarhedenvillan", "Älvsbyhus", "Eksjöhus", "Trivselhus", "Movehome", "Götenehus", "VårgårdaHus", "Willa Nordic", "Faluhus", "LB-Hus", "Hjältevadshus", "SmålandsVillan", "Lantmäteriet", "Boverket", "SCB", "SBAB", "Landshypotek", "Danske Bank", "Nordea", "SEB", "Handelsbanken", "Alecta", "Folksam"];

    let csv = [];
    async function load() {
        try {
            const r = await fetch('Aiorter.csv');
            const t = await r.text();
            csv = t.split('\n').slice(1).map(l => {
                const c = l.split(';');
                return { o: c[0]?.trim(), k: c[1]?.trim(), d: c[3]?.trim() };
            }).filter(x => x.o);
        } catch(e) { console.log("CSV offline"); }
    }

    const inp = document.getElementById('search-input');
    const box = document.getElementById('auto-box');

    inp.addEventListener('input', () => {
        const v = inp.value.toLowerCase();
        box.innerHTML = '';
        if(v.length < 1) { box.style.display = 'none'; return; }
        const hits = csv.filter(x => x.o.toLowerCase().includes(v)).slice(0, 5);
        if(hits.length > 0) {
            hits.forEach(h => {
                const d = document.createElement('div');
                d.className = 'auto-item';
                d.innerHTML = `<span>${h.o}</span><small>${h.k}</small>`;
                d.onclick = () => { inp.value = h.o; box.style.display = 'none'; runEngine(); };
                box.appendChild(d);
            });
            box.style.display = 'block';
        }
    });

    function runEngine() {
        const v = inp.value.trim();
        if(!v) return;
        const data = csv.find(x => x.o.toLowerCase() === v.toLowerCase()) || { o: v, d: "Ansluter till lokala mäklarnoder..." };
        
        document.getElementById('results').style.display = 'block';
        document.getElementById('res-city').innerText = data.o.toUpperCase();
        document.getElementById('res-desc').innerText = data.d;

        document.getElementById('h-link').href = `https://www.hemnet.se/bostader?location_ids=${encodeURIComponent(data.o)}`;
        document.getElementById('b-link').href = `https://www.booli.se/sok?q=${encodeURIComponent(data.o)}`;

        const grid = document.getElementById('node-grid');
        grid.innerHTML = '';
        // Vi skapar 300 noder genom att loopa broker-listan flera gånger (för visuell effekt)
        for(let i=0; i<3; i++) {
            brokers.forEach(b => {
                const n = document.createElement('div');
                n.className = 'node';
                n.innerText = b;
                grid.appendChild(n);
            });
        }
        window.scrollTo({ top: document.getElementById('results').offsetTop - 20, behavior: 'smooth' });
    }

    load();
</script>
</body>
</html>

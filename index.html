<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLABOSTÄDER // ARCHITECT_V8</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00e1ff;
            --accent-glow: rgba(0, 225, 255, 0.4);
            --gold: #d4af37;
            --bg-deep: #020408;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-deep); color: #e0e6ed;
            font-family: 'Outfit', sans-serif; overflow: hidden;
        }

        /* LEGITIM BAKGRUND: ATMOSFÄRISKT DJUP */
        .universe {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #0c1a30 0%, #020408 100%);
        }

        .grid-engine {
            position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
            opacity: 0.3;
        }

        /* HEADER & STATUS */
        header {
            padding: 30px 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        .brand { font-weight: 700; letter-spacing: 2px; font-size: 1.1rem; }
        .brand span { color: var(--accent); }

        .sys-log { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: #556; }
        .sys-log span { color: var(--accent); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0; } }

        /* MAIN SEARCH HUB */
        .container {
            max-width: 1100px; margin: 0 auto; padding-top: 10vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .hero-text { text-align: center; margin-bottom: 40px; }
        .hero-text h1 { font-size: 3.5rem; margin: 0; font-weight: 700; letter-spacing: -2px; }
        .hero-text p { color: #889; font-size: 1.1rem; margin-top: 10px; }

        /* ADVANCED SEARCH BOX */
        .search-container {
            width: 100%; max-width: 750px; position: relative;
        }

        .omni-input-wrapper {
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px; border-radius: 4px; display: flex; align-items: center;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .omni-input-wrapper:focus-within {
            border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow);
        }

        input {
            flex: 1; background: transparent; border: none; padding: 25px;
            color: #fff; font-size: 1.2rem; font-family: 'Outfit', sans-serif;
            outline: none;
        }

        /* AUTOCOMPLETE DROPDOWN */
        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #0a0e14; border: 1px solid var(--border);
            margin-top: 5px; max-height: 300px; overflow-y: auto;
            display: none; z-index: 100;
        }

        .suggestion-item {
            padding: 20px; cursor: pointer; border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }

        .suggestion-item:hover { background: var(--accent); color: #000; }

        /* ANALYS-PANEL */
        #result-matrix {
            display: none; width: 100%; margin-top: 50px;
            animation: slideFade 0.6s forwards;
        }

        @keyframes slideFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard {
            display: grid; grid-template-columns: 2fr 1fr; gap: 20px;
        }

        .main-report {
            background: var(--glass); border: 1px solid var(--border); padding: 40px;
        }

        .side-stats { display: flex; flex-direction: column; gap: 20px; }
        
        .stat-box {
            background: var(--glass); border: 1px solid var(--border); padding: 20px;
        }

        .stat-box label { font-size: 0.6rem; text-transform: uppercase; color: #556; letter-spacing: 2px; }
        .stat-box .val { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-top: 5px; }

        /* BUTTONS */
        .action-row { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            flex: 1; padding: 18px; text-align: center; text-decoration: none;
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            border: 1px solid var(--border); color: #fff; transition: 0.3s;
        }
        .btn:hover { background: #fff; color: #000; }
        .btn.primary { background: var(--accent); color: #000; border: none; }

    </style>
</head>
<body>

<div class="universe">
    <div class="grid-engine"></div>
</div>

<header>
    <div class="brand">ALLA<span>BOSTÄDER</span></div>
    <div class="sys-log"><span>●</span> SYSTEM_NODES_ACTIVE: 104_LOGIC_GATES_RUNNING</div>
</header>

<div class="container">
    <div class="hero-text">
        <h1 id="title-anim">Institutional Data Aggregator</h1>
        <p>Real-tidsanalys av dolda objekt, besiktningsarkiv och marknadsvolatilitet.</p>
    </div>

    <div class="search-container">
        <div class="omni-input-wrapper">
            <input type="text" id="omni-input" placeholder="Sök ort (t.ex. Gävle, Bergby...)" autocomplete="off">
        </div>
        <div class="suggestions" id="suggestions-box"></div>
    </div>

    <div id="result-matrix">
        <div class="dashboard">
            <div class="main-report">
                <div style="font-family:'Space Mono'; font-size: 0.7rem; color: var(--accent); margin-bottom: 10px;">> OMNI_AI_REPORT_GENERATED</div>
                <h2 id="res-city" style="font-size: 2.5rem; margin: 0 0 20px 0;">STAD</h2>
                <div id="res-desc" style="line-height: 1.8; color: #a0a0b0; font-size: 1.1rem;"></div>
                
                <div class="action-row">
                    <a href="#" id="link-h" class="btn primary" target="_blank">Hemnet Source</a>
                    <a href="#" id="link-b" class="btn" target="_blank">Booli Analysis</a>
                    <a href="#" class="btn" style="border-color: var(--gold); color: var(--gold);">Dolda Handlingar</a>
                </div>
            </div>

            <div class="side-stats">
                <div class="stat-box">
                    <label>Investeringsindex</label>
                    <div class="val">8.4 / 10</div>
                </div>
                <div class="stat-box">
                    <label>Dolda Dokument</label>
                    <div class="val" id="doc-count">244st</div>
                </div>
                <div class="stat-box">
                    <label>Prisprognos 2026</label>
                    <div class="val" style="color: #00ff88;">+4.2%</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let csvData = [];
    const input = document.getElementById('omni-input');
    const suggestBox = document.getElementById('suggestions-box');
    const matrix = document.getElementById('result-matrix');

    // 1. LADDA DATABASEN
    async function init() {
        try {
            const resp = await fetch('/Aiorter.csv?v=' + Date.now());
            const text = await resp.text();
            const cleanText = text.replace(/^\uFEFF/, "");
            const lines = cleanText.split(/\r?\n/);
            
            // Omvandla till objekt för snabb sökning
            csvData = lines.slice(1).map(line => {
                const cols = line.split(';');
                return { ort: cols[0], kommun: cols[1], desc: cols[3] };
            }).filter(item => item.ort);
            
            console.log("Database initialized: " + csvData.length + " sectors.");
        } catch(e) { console.error("Database error."); }
    }

    // 2. SEARCH-AHEAD LOGIK (Viktigaste funktionen!)
    input.addEventListener('input', function() {
        const val = this.value.toLowerCase();
        suggestBox.innerHTML = '';
        
        if (val.length < 1) {
            suggestBox.style.display = 'none';
            return;
        }

        const matches = csvData.filter(v => v.ort.toLowerCase().startsWith(val)).slice(0, 8);

        if (matches.length > 0) {
            matches.forEach(m => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerText = m.ort + " (" + m.kommun + ")";
                div.onclick = () => selectCity(m);
                suggestBox.appendChild(div);
            });
            suggestBox.style.display = 'block';
        } else {
            suggestBox.style.display = 'none';
        }
    });

    // 3. VAL AV STAD
    function selectCity(data) {
        input.value = data.ort;
        suggestBox.style.display = 'none';
        
        // Animera fram resultatet
        matrix.style.display = 'block';
        document.getElementById('res-city').innerText = data.ort.toUpperCase();
        document.getElementById('res-desc').innerText = data.desc || "Neural analys pågår för denna sektor...";
        document.getElementById('doc-count').innerText = Math.floor(Math.random() * 500) + 50 + "st";

        // Uppdatera länkar
        const k = data.kommun.replace(" kommun", "");
        document.getElementById('link-h').href = `https://www.hemnet.se/bostader?location_ids=${encodeURIComponent(data.ort)}`;
        document.getElementById('link-b').href = `https://www.booli.se/sok?q=${encodeURIComponent(k)}`;
        
        // Skrolla ner snyggt
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.onload = init;
</script>

</body>
</html>

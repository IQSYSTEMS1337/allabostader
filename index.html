<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">Allabostäder | Fastighetsintelligens & Dolda Hem</title>
    <meta name="description" id="dynamic-desc" content="Sök dolda bostäder och Ghost Listings innan de når Hemnet. AI-driven fastighetsdata.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --black: #050505; --white: #ffffff; --accent: #007AFF; --gold: #c5a059; }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .aura { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,122,255,0.08) 0%, rgba(0,0,0,1) 70%); z-index: -1; }
        .hero { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        h1 { font-size: clamp(40px, 10vw, 90px); font-weight: 900; letter-spacing: -4px; margin: 0; line-height: 0.9; background: linear-gradient(180deg, #fff 40%, #555 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container { width: 100%; max-width: 650px; position: relative; margin-top: 40px; z-index: 10; }
        input { width: 100%; padding: 25px 30px; border-radius: 50px; border: 1px solid #333; background: rgba(255,255,255,0.05); color: #fff; font-size: 18px; outline: none; backdrop-filter: blur(15px); box-sizing: border-box; }
        .results { position: absolute; top: 110%; left: 0; right: 0; background: #0c0c0c; border-radius: 20px; border: 1px solid #222; max-height: 400px; overflow-y: auto; display: none; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .item { padding: 20px 25px; border-bottom: 1px solid #151515; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .item:hover { background: #151515; }
        .ghost-badge { font-size: 10px; color: var(--accent); border: 1px solid rgba(0,122,255,0.3); padding: 4px 8px; border-radius: 4px; font-weight: 900; }
        #vault { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .vault-card { background: #0a0a0a; border: 1px solid #222; padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; }
        .btn-gold { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <section class="hero">
        <p style="color:var(--accent); font-weight:700; letter-spacing:4px; margin-bottom:10px;">STEALTH MARKET ENGINE</p>
        <h1>Dolda Hem.<br>Innan Alla Andra.</h1>
        <div class="search-container">
            <input type="text" id="s" placeholder="Sök stad eller kommun..." autocomplete="off">
            <div id="r" class="results"></div>
        </div>
    </section>

    <div id="vault">
        <div class="vault-card">
            <h2 style="color:var(--gold)">Åtkomst Begärd</h2>
            <p>Verifiera för att låsa upp <br><strong id="v-city"></strong>.</p>
            <input type="password" placeholder="Krypteringsnyckel" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:#fff; border-radius:10px; text-align:center;">
            <button class="btn-gold" onclick="alert('Ansluter...'); location.reload();">Verifiera</button>
            <button onclick="document.getElementById('vault').style.display='none'" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer;">AVBRYT</button>
        </div>
    </div>

    <script>
        let db = [];
        const sI = document.getElementById('s'), rB = document.getElementById('r'), v = document.getElementById('vault'), vC = document.getElementById('v-city');

        // Ladda CSV med robust hantering för å, ä, ö och radbrytningar
        fetch('Aiorter.csv')
            .then(res => res.text())
            .then(data => {
                db = data.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    return c.length >= 2 ? { o: c[0].trim(), k: c[1].trim(), t: c[2]?.trim(), d: c[3]?.trim() } : null;
                }).filter(x => x);
            });

        sI.addEventListener('input', () => {
            const q = sI.value.toLowerCase().trim();
            if (q.length < 2) { rB.style.display = 'none'; return; }
            const matches = db.filter(i => i.o.toLowerCase().includes(q) || i.k.toLowerCase().includes(q)).slice(0, 8);
            if (matches.length > 0) {
                rB.style.display = 'block';
                rB.innerHTML = matches.map(m => `
                    <div class="item" onclick="openV('${m.o}', '${m.t}', '${m.d}')">
                        <div><strong>${m.o}</strong><span style="font-size:11px; opacity:0.5;">${m.k}</span></div>
                        <div class="ghost-badge">GHOST LISTING</div>
                    </div>`).join('');
            } else { rB.style.display = 'none'; }
        });

        function openV(ort, ttl, dsc) {
            vC.innerText = ort;
            v.style.display = 'flex';
            if (ttl) document.title = ttl;
            if (dsc) document.querySelector('meta[name="description"]').content = dsc;
        }
    </script>
</body>
</html>
